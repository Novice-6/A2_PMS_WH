<div style="padding: 20px; max-width: 600px; margin: auto; background: #f9f9f9; border-radius: 8px;">
  <h2>Manage Inventory</h2>
  
  <!-- 提示信息区域 (代替 alert) -->
  <div *ngIf="message" [style.color]="isError ? 'red' : 'green'" style="padding: 10px; border: 1px solid; margin-bottom: 15px;">
    {{ message }}
  </div>

  <!-- 删除确认区域 -->
  <div *ngIf="showDeleteConfirm" style="background: yellow; padding: 15px; margin-bottom: 15px;">
    <p>Are you sure you want to delete <b>{{ currentItem.name }}</b>?</p>
    <button (click)="executeDelete()" style="color: red;">Yes</button>
    <button (click)="cancelDelete()">No</button>
  </div>

  <!-- 表单区域 -->
  <div style="display: flex; flex-direction: column; gap: 10px;">
    
    <div>
      <label>Item ID:</label><br>
      <input type="text" [(ngModel)]="currentItem.id" style="width: 100%;">
    </div>

    <div>
      <label>Item Name (Key for Update/Delete):</label><br>
      <input type="text" [(ngModel)]="currentItem.name" style="width: 100%;">
    </div>

    <div>
      <label>Category:</label><br>
      <select [(ngModel)]="currentItem.category" style="width: 100%;">
        <option value="Electronics">Electronics</option>
        <option value="Furniture">Furniture</option>
        <option value="Clothing">Clothing</option>
        <option value="Tools">Tools</option>
        <option value="Miscellaneous">Miscellaneous</option>
      </select>
    </div>

    <div>
      <label>Supplier Name:</label><br>
      <input type="text" [(ngModel)]="currentItem.supplier" style="width: 100%;">
    </div>

    <div>
      <label>Quantity:</label><br>
      <input type="number" [(ngModel)]="currentItem.quantity" style="width: 100%;">
    </div>

    <div>
      <label>Price ($):</label><br>
      <input type="number" [(ngModel)]="currentItem.price" style="width: 100%;">
    </div>

    <div>
      <label>Stock Status:</label><br>
      <select [(ngModel)]="currentItem.stockStatus" style="width: 100%;">
        <option value="In Stock">In Stock</option>
        <option value="Low Stock">Low Stock</option>
        <option value="Out of Stock">Out of Stock</option>
      </select>
    </div>

    <div>
      <label>Is Popular?</label><br>
      <select [(ngModel)]="currentItem.isPopular" style="width: 100%;">
        <option [ngValue]="false">No</option>
        <option [ngValue]="true">Yes</option>
      </select>
    </div>

    <div>
      <label>Comment:</label><br>
      <input type="text" [(ngModel)]="currentItem.comment" style="width: 100%;">
    </div>

    <!-- 按钮组 -->
    <div style="margin-top: 15px;">
      <button (click)="onAdd()" style="background: green; color: white; padding: 10px;">Add Item</button>
      <button (click)="onUpdate()" style="background: orange; color: black; padding: 10px; margin-left: 10px;">Update</button>
      <button (click)="triggerDelete()" style="background: red; color: white; padding: 10px; margin-left: 10px;">Delete</button>
    </div>
  </div>
</div>
