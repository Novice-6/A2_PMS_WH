<div class="manage-container">
  <h2>Manage Inventory</h2>
  
  <div *ngIf="message" class="alert" [style.color]="isError ? 'red' : 'green'" [style.border]="'1px solid ' + (isError ? 'red' : 'green')">
    {{ message }}
  </div>

  <div *ngIf="showDeleteConfirm" class="alert" style="background: #fff3cd; color: #856404; border: 1px solid #ffeeba;">
    <p>Are you sure you want to delete <b>{{ currentItem.name }}</b>?</p>
    <button (click)="executeDelete()" class="btn btn-danger">Yes, Delete</button>
    <button (click)="cancelDelete()" class="btn btn-warning" style="margin-left: 10px;">Cancel</button>
  </div>

  <div style="display: flex; flex-direction: column;">
    
    <!-- 极佳的用户体验提示 -->
    <p style="font-size: 0.9rem; color: #666; margin-top: 0;">
      Fields marked with <span style="color: red; font-weight: bold;">*</span> are required.
    </p>

    <div class="form-group">
      <label>Item ID <span style="color: red;">*</span>:</label>
      <input type="text" [(ngModel)]="currentItem.id" class="form-control">
    </div>

    <div class="form-group">
      <label>Item Name (Key for Update/Delete) <span style="color: red;">*</span>:</label>
      <input type="text" [(ngModel)]="currentItem.name" class="form-control">
    </div>

    <div class="form-group">
      <label>Category <span style="color: red;">*</span>:</label>
      <select [(ngModel)]="currentItem.category" class="form-control">
        <option value="Electronics">Electronics</option>
        <option value="Furniture">Furniture</option>
        <option value="Clothing">Clothing</option>
        <option value="Tools">Tools</option>
        <option value="Miscellaneous">Miscellaneous</option>
      </select>
    </div>

    <div class="form-group">
      <label>Supplier Name <span style="color: red;">*</span>:</label>
      <input type="text" [(ngModel)]="currentItem.supplier" class="form-control">
    </div>

    <div class="form-group">
      <label>Quantity <span style="color: red;">*</span>:</label>
      <input type="number" [(ngModel)]="currentItem.quantity" min="0" onkeypress="return event.charCode >= 48 && event.charCode <= 57" class="form-control">
    </div>

    <div class="form-group">
      <label>Price ($) <span style="color: red;">*</span>:</label>
      <input type="number" [(ngModel)]="currentItem.price" min="0" step="0.01" onkeypress="return (event.charCode >= 48 && event.charCode <= 57) || event.charCode === 46" class="form-control">
    </div>

    <div class="form-group">
      <label>Stock Status <span style="color: red;">*</span>:</label>
      <select [(ngModel)]="currentItem.stockStatus" class="form-control">
        <option value="In Stock">In Stock</option>
        <option value="Low Stock">Low Stock</option>
        <option value="Out of Stock">Out of Stock</option>
      </select>
    </div>

    <div class="form-group">
      <label>Is Popular? <span style="color: red;">*</span>:</label>
      <select [(ngModel)]="currentItem.isPopular" class="form-control">
        <option [ngValue]="false">No</option>
        <option [ngValue]="true">Yes</option>
      </select>
    </div>

    <!-- 明确标识出选填项 -->
    <div class="form-group">
      <label>Comment <span style="color: #666; font-size: 0.9em;">(Optional)</span>:</label>
      <input type="text" [(ngModel)]="currentItem.comment" class="form-control">
    </div>

    <div style="margin-top: 15px;">
      <button (click)="onAdd()" class="btn btn-success">Add Item</button>
      <button (click)="onUpdate()" class="btn btn-warning" style="margin-left: 10px;">Update</button>
      <button (click)="triggerDelete()" class="btn btn-danger" style="margin-left: 10px;">Delete</button>
    </div>
  </div>
</div>
