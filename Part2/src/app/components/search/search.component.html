<div class="search-container">
  <h2>Search & View Inventory</h2>
  
  <div style="margin-bottom: 20px;">
    <input type="text" [(ngModel)]="searchTerm" placeholder="Search by name..." (input)="onSearch()" class="search-bar">
    <button (click)="onSearch()" class="btn">Search</button>
    <button (click)="showPopular()" class="btn" style="background-color: #ffc107; color: black;">Show Popular Only</button>
  </div>

  <table *ngIf="displayItems.length > 0; else noData" class="inventory-table">
    <tr>
      <th>ID</th><th>Name</th><th>Category</th><th>Supplier</th>
      <th>Qty</th><th>Price</th><th>Status</th><th>Popular</th><th>Comment</th>
    </tr>
    <tr *ngFor="let item of displayItems">
      <td>{{ item.id }}</td>
      <td><strong>{{ item.name }}</strong></td>
      <td>{{ item.category }}</td>
      <td>{{ item.supplier }}</td>
      <td>{{ item.quantity }}</td>
      <td>${{ item.price }}</td>
      <td>{{ item.stockStatus }}</td>
      <td>{{ item.isPopular ? 'Yes' : 'No' }}</td>
      <td>{{ item.comment }}</td>
    </tr>
  </table>

  <ng-template #noData>
    <p style="padding: 20px; background: #eee; border-radius: 4px;">No items found.</p>
  </ng-template>
</div>
